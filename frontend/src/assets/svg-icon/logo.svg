<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
  <!-- KnowHub · 枢 · 中心交汇 -->
  <!-- x: two crossing lines -->
  <line x1="5" y1="5" x2="19" y2="19" stroke="#818cf8" stroke-width="2" stroke-linecap="round"/>
  <line x1="19" y1="5" x2="5" y2="19" stroke="#6366f1" stroke-width="2" stroke-linecap="round"/>
  <!-- y: vertical stem + fork -->
  <line x1="12" y1="12" x2="12" y2="18" stroke="#06b6d4" stroke-width="2" stroke-linecap="round"/>
  <line x1="12" y1="17" x2="8" y2="22" stroke="#0891b2" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="12" y1="17" x2="16" y2="22" stroke="#0891b2" stroke-width="1.5" stroke-linecap="round"/>
  <!-- center hub node -->
  <circle cx="12" cy="12" r="3" fill="#0f172a" stroke="white" stroke-width="1.5"/>
  <circle cx="12" cy="12" r="1" fill="white"/>
</svg>
